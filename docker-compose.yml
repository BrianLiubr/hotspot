services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      - db
    volumes:
      - ./:/app
    entrypoint: ["sh", "/app/entrypoint.sh"]
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: hotspot_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
